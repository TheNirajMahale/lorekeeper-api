<!DOCTYPE html>
<html>
<head>
    <title>Google OAuth Token Generator</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>1. Sign in to get a Token</h2>
    
    <!-- Load Google's Identity library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Configure the sign-in button -->
    <!-- Replace YOUR_CLIENT_ID_HERE with your actual Google Client ID -->
    <div id="g_id_onload"
         data-client_id="YOUR_CLIENT_ID_HERE"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>

    <h2>2. Copy your Token</h2>
    <p>Once you sign in, your ID token will appear in the box below. Copy it and paste it into Bruno!</p>
    <textarea id="tokenText" rows="10" cols="100" style="padding: 10px;" placeholder="Token will appear here..."></textarea>

    <script>
      function handleCredentialResponse(response) {
         // This is the actual ID token from Google!
         document.getElementById('tokenText').value = response.credential;
      }
    </script>
</body>
</html>
